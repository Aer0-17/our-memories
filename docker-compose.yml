services:
  postgres:
    container_name: our-memories-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: our_memories
      POSTGRES_USER: our_memories
      POSTGRES_PASSWORD: our_memories
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U our_memories -d our_memories"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: our-memories-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: our_memories
      MINIO_ROOT_PASSWORD: our-memories-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    container_name: our-memories-minio-init
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 our_memories our-memories-secret &&
      mc mb -p local/our-memories || true &&
      mc anonymous set download local/our-memories
      "

  server:
    container_name: our-memories-server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4002
      DATABASE_URL: postgresql://our_memories:our_memories@postgres:5432/our_memories?schema=public
      JWT_SECRET: change-me-in-production-to-a-long-random-secret
      WEB_ORIGIN: http://localhost:3002
      S3_ENDPOINT: http://minio:9000
      S3_REGION: auto
      S3_ACCESS_KEY_ID: our_memories
      S3_SECRET_ACCESS_KEY: our-memories-secret
      S3_BUCKET: our-memories
      S3_PUBLIC_BASE_URL: http://localhost:9000/our-memories
      ASTRBOT_BASE_URL: ${ASTRBOT_BASE_URL:-}
      ASTRBOT_API_KEY: ${ASTRBOT_API_KEY:-}
    ports:
      - "4002:4002"

volumes:
  postgres-data:
  minio-data:
